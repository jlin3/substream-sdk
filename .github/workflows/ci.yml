name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IVSBackend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: IVSBackend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: npx tsc --noEmit

  web-sdk:
    name: Web SDK (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/web-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm run build
