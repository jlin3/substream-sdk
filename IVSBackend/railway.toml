# Railway deployment configuration for IVS Streaming Backend
# Set Root Directory to "IVSBackend" in Railway settings

[build]
builder = "nixpacks"
# Only generate Prisma client during build (no DB connection needed)
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma db push --accept-data-loss 2>&1 || echo 'prisma push failed, continuing...' && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

